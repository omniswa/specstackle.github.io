<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpecsTackle Content Generator</title>
  <meta name="robots" content="noindex, follow">
  <link rel="stylesheet" href="styles/generator.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preload" href="fonts/outfit.woff2" as="font" type="font/woff2" crossorigin>
</head>

<body>

  <header>
    <nav>
      <a href="#" class="logo">SPECSTACKLE GENERATOR</a>
    </nav>
  </header>

  <main class="container">
    <h1 style="text-align: center;">Create Article</h1>

    <form id="generatorForm">
      <!-- Site Origin Override -->
      <div class="form-group full-width">
        <label for="origin">Site Origin (Base URL)</label>
        <input type="text" id="origin" name="origin" value="https://specstackle.top" required>
      </div>

      <div class="form-group full-width">
        <label for="title">Article Title</label>
        <input type="text" id="title" name="title" placeholder="e.g. Realme C83 5G Specs: The 7000mAh Budget Beast" required>
      </div>

      <div class="form-group full-width">
        <label for="metaDesc">Meta Description</label>
        <textarea type="text" id="metaDesc" name="metaDesc" placeholder="Brief SEO description..." rows="4" required style="min-height: 120px"></textarea>
      </div>

      <div class="form-group">
        <label for="brand">Brand</label>
        <input type="text" id="brand" name="brand" placeholder="e.g. Realme" required>
      </div>

      <div class="form-group">
        <label for="model">Model</label>
        <input type="text" id="model" name="model" placeholder="e.g. C83 5G" required>
      </div>

      <!-- ADDED YEAR SELECTION -->
      <div class="form-group">
        <label for="yearSelect">Target Folder Year</label>
        <select id="yearSelect" name="yearSelect" required style="background-color: var(--input-bg); border: 1px solid var(--border); color: var(--text-main); padding: 12px 16px; border-radius: 6px; font-family: inherit; font-size: 0.95rem; outline: none;">
          <option value="2025">2025</option>
          <option value="2026" selected>2026</option>
          <option value="2027">2027</option>
          <option value="2028">2028</option>
        </select>
      </div>

      <div class="form-group">
        <label for="price">Price</label>
        <input type="number" id="price" name="price" placeholder="e.g. 160" required>
      </div>

      <div class="form-group">
        <label for="battery">Battery Capacity</label>
        <input type="number" id="battery" name="battery" placeholder="e.g. 7000" required>
      </div>

      <div class="form-group full-width">
        <label for="processor">Processor</label>
        <input type="text" id="processor" name="processor" placeholder="e.g. Dimensity 6300" required>
      </div>

      <div class="form-group full-width">
        <label for="content">Content (Markdown)</label>
        <textarea id="content" name="content" placeholder="Write your content here using Markdown formatting. Tables and external links will be parsed automatically..." required></textarea>
      </div>

      <div class="form-group full-width button-group">
        <button type="submit" id="generateBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />
          </svg>
          Generate & Download HTML
        </button>
        <button type="button" class="secondary" id="clearBtn">Clear Form</button>
      </div>
    </form>

    <h3>Data Preview</h3>
    <div class="preview-box">
      <button class="secondary copy-btn" id="copyJsonBtn">Copy JSON</button>
      <pre id="jsonPreview">Fill out the form to generate JSON...</pre>
    </div>
  </main>

  <aside id="toast" class="toast">Action Successful!</aside>

  <script src="scripts/generator.js" defer></script>
</body>

</html>
